<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | USCAATIGS 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        html { scroll-behavior: smooth; }
        @media (max-width: 640px) {
            h1 { font-size: 1.75rem !important; }
            h2 { font-size: 1.5rem !important; }
        }
    </style>
</head>
<body class="bg-gray-50 overflow-x-hidden">

    <!-- Navigation -->
    <nav class="fixed w-full z-50">
        <div class="bg-white/95 backdrop-blur-md shadow-lg mx-2 mt-2 rounded-2xl">
            <div class="max-w-7xl mx-auto px-3 py-3 flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="../ucalogo.jpg" alt="USCAATIGS Logo" class="h-8 sm:h-10 w-auto">
                    <span class="text-lg sm:text-xl font-black tracking-tight text-gray-900 font-['Playfair_Display']">USCAATIGS <span class="text-amber-600">2026</span></span>
                </a>
                <div class="hidden lg:flex items-center gap-4">
                    <a href="index.html" class="text-xs font-bold uppercase tracking-wider text-gray-700 hover:text-amber-600">Home</a>
                    <a href="program.html" class="text-xs font-bold uppercase tracking-wider text-gray-700 hover:text-amber-600">Program</a>
                    <a href="sponsors.html" class="text-xs font-bold uppercase tracking-wider text-gray-700 hover:text-amber-600">Sponsors</a>
                    <a href="faq.html" class="text-xs font-bold uppercase tracking-wider text-gray-700 hover:text-amber-600">FAQ</a>
                    <a href="registration.html" class="px-4 py-2 bg-amber-600 text-white text-xs font-bold uppercase tracking-wider rounded-full hover:bg-amber-700">Register</a>
                </div>
                <button onclick="toggleMenu()" class="lg:hidden p-2">
                    <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden lg:hidden bg-white mx-2 rounded-b-2xl shadow-lg">
            <div class="px-4 py-4 flex flex-col gap-2">
                <a href="index.html" class="text-sm font-bold uppercase text-gray-700 py-2">Home</a>
                <a href="program.html" class="text-sm font-bold uppercase text-gray-700 py-2">Program</a>
                <a href="sponsors.html" class="text-sm font-bold uppercase text-gray-700 py-2">Sponsors</a>
                <a href="faq.html" class="text-sm font-bold uppercase text-gray-700 py-2">FAQ</a>
                <a href="registration.html" class="mt-2 px-4 py-3 bg-amber-600 text-white text-sm font-bold uppercase rounded-full text-center">Register</a>
            </div>
        </div>
    </nav>

    <div class="h-20"></div>

    <!-- Header -->
    <section class="py-12 md:py-20 bg-gray-900 text-white">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <p class="text-xs font-bold text-amber-500 uppercase tracking-[0.3em] mb-3">Get in Touch</p>
            <h1 class="text-3xl md:text-5xl font-black font-['Playfair_Display']">Contact <span class="text-amber-500">Us</span></h1>
        </div>
    </section>

    <!-- Contact Form -->
    <section class="py-12 md:py-16 px-4">
        <div class="max-w-2xl mx-auto">
            <div class="bg-white rounded-2xl p-6 md:p-8 shadow-lg">
                <h2 class="text-xl font-bold text-gray-900 mb-6">Send us a message</h2>
                <form class="space-y-4">
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">First Name *</label>
                            <input type="text" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Last Name *</label>
                            <input type="text" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Email *</label>
                        <input type="email" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Company</label>
                        <input type="text" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Subject</label>
                        <select class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition">
                            <option>General Inquiry</option>
                            <option>Sponsorship</option>
                            <option>Speaking Opportunity</option>
                            <option>Press & Media</option>
                            <option>Registration Support</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Message *</label>
                        <textarea rows="4" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition"></textarea>
                    </div>
                    <button type="submit" class="w-full py-3 bg-amber-600 text-white font-bold rounded-lg hover:bg-amber-700 transition">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Regional Offices -->
    <section class="py-12 md:py-16 px-4 bg-gray-100">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-2xl md:text-3xl font-black text-center text-gray-900 mb-8 font-['Playfair_Display']">Regional <span class="text-amber-600">Offices</span></h2>
            
            <div class="grid md:grid-cols-3 gap-6">
                <div class="bg-white rounded-xl p-6 shadow-sm">
                    <div class="w-12 h-12 bg-amber-100 rounded-lg flex items-center justify-center mb-4">
                        <svg class="w-6 h-6 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <h3 class="font-bold text-gray-900 mb-2">USA (Headquarters)</h3>
                    <p class="text-sm text-gray-600">Washington DC</p>
                </div>
                <div class="bg-white rounded-xl p-6 shadow-sm">
                    <div class="w-12 h-12 bg-amber-100 rounded-lg flex items-center justify-center mb-4">
                        <svg class="w-6 h-6 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <h3 class="font-bold text-gray-900 mb-2">Africa</h3>
                    <p class="text-sm text-gray-600">Addis Ababa, Kenya, Nigeria</p>
                </div>
                <div class="bg-white rounded-xl p-6 shadow-sm">
                    <div class="w-12 h-12 bg-amber-100 rounded-lg flex items-center justify-center mb-4">
                        <svg class="w-6 h-6 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <h3 class="font-bold text-gray-900 mb-2">Email</h3>
                    <p class="text-sm text-gray-600">info@uscaatigs.com</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-8 border-t border-gray-800">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <p class="text-xs text-gray-500 uppercase">© 2026 USCAATIGS. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
